version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DATABASE_URL=sqlite:///./user.db
      - GO_ANALYZER_URL=http://analyzer:8080
      - GO_SIMPLIFIER_URL=http://simplifier:8081
      - API_KEYS=${API_KEYS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    volumes:
      - ./data:/app/data
    depends_on:
      - analyzer
      - simplifier
    restart: unless-stopped
    networks:
      - langassist

  analyzer:
    build:
      context: ./analyzer-go
      dockerfile: ../Dockerfile.analyzer
    expose:
      - "8080"
    environment:
      - PORT=8080
    restart: unless-stopped
    networks:
      - langassist

  simplifier:
    build:
      context: ./golern-go
      dockerfile: ../Dockerfile.simplifier
    expose:
      - "8081"
    environment:
      - PORT=8081
    volumes:
      - ./golern-go/data:/app/data
    restart: unless-stopped
    networks:
      - langassist

networks:
  langassist:
    driver: bridge